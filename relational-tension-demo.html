<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relational Tension Lines</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f0eb 0%, #e8dfd5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #5a5348;
        }

        #container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(90, 83, 72, 0.15);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #5a5348;
            margin-bottom: 12px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #9b8f82;
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        #tensionCanvas {
            display: block;
            margin: 0 auto;
            touch-action: none;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 2px solid #e8dfd5;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: #5a5348;
        }

        .legend-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(90, 83, 72, 0.2);
        }

        .legend-dot.partner-a {
            background-color: #c77f5a;
        }

        .legend-dot.partner-b {
            background-color: #8b7d6f;
        }

        .instructions {
            text-align: center;
            color: #9b8f82;
            font-size: 14px;
            margin-top: 24px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            #container {
                padding: 24px;
            }

            h1 {
                font-size: 24px;
            }

            .subtitle {
                font-size: 14px;
            }

            .legend {
                flex-direction: column;
                gap: 12px;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>Relational Tension Lines</h1>
        <p class="subtitle">
            Each line represents a dimension of relationship dynamics.<br>
            The focus is on the <strong>distance between partners</strong>, not absolute positions.
        </p>

        <canvas id="tensionCanvas"></canvas>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot partner-a"></div>
                <span>Partner A</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot partner-b"></div>
                <span>Partner B</span>
            </div>
        </div>

        <p class="instructions">
            Drag the markers to explore different positions along each tension line
        </p>
    </div>

    <script src="relational-tension-diagram.js"></script>
</body>
</html>
