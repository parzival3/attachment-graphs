<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attachment Style Diagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e8dfd4 0%, #d4c9bd 100%);
            padding: 20px;
        }
        
        #container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
        }
        
        h2 {
            color: #5a5348;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .subtitle {
            color: #8b7d6f;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 300;
        }
        
        canvas {
            border-radius: 12px;
            background: linear-gradient(to bottom, #fefdfb 0%, #f9f7f4 100%);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05);
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div id="container">
        <h2>Attachment Style Diagram</h2>
        <p class="subtitle">Understanding your attachment patterns</p>
        <canvas id="attachmentCanvas" width="700" height="500"></canvas>
    </div>
    <script src="attachment-diagram.js"></script>
</body>
</html>
