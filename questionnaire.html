<!DOCTYPE html>
<html lang="en">
<head>

  <title>Cross-Cultural Couple Questionnaire | Pia Torp</title>
  <link rel="stylesheet" href="questionnaire.css">

      background: linear-gradient(to bottom, #f2ede8, #e8dfd5);
    }
    .q-main {
      padding-top: 40px;
    }
  </style>
</head>
<body>

  <header class="q-header">

    <div id="app" class="q-container"></div>
  </main>

  <script src="questionnaire-config.js"></script>
  <script src="questionnaire-framework.js"></script>
  <script>
    var q = new Questionnaire(QUESTIONNAIRE_CONFIG);
    q.mount('app');

</html>
