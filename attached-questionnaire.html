<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attachment Style Self-Assessment</title>
  <link rel="stylesheet" href="questionnaire.css">
  <style>
    body { background: linear-gradient(to bottom, #f2ede8, #e8dfd5); }
    .q-main { padding-top: 40px; }
  </style>
</head>
<body>

  <header class="q-header">
    <a href="https://www.piatorp.dk" class="q-site-link">&larr; piatorp.dk</a>
  </header>

  <main class="q-main">
    <div id="app" class="q-container"></div>
  </main>

  <script src="attached-questionnaire-config.js"></script>
  <script src="questionnaire-framework.js"></script>
  <script src="csv-loader.js"></script>
  <script>
    loadQuestionsCSV('questions.csv', function (err, questions) {
      if (err) {
        document.getElementById('app').innerHTML =
          '<p style="padding:40px 20px;color:#c0392b;text-align:center;">Failed to load questions. Please reload the page.</p>';
        return;
      }
      ATTACHED_CONFIG.questions = questions;

      // ── Demo mode (?demo in URL) ───────────────────────────────────────────
      // Fills in a fixed profile (Anxious self + Secure partner) and jumps
      // straight to the results page — useful for testing without clicking
      // through all 75 questions.
      if (window.location.search.indexOf('demo') !== -1) {
        var demoAnswers = {};
        questions.forEach(function (q) {
          if (q.section === 'self') {
            // Anxious self: only group-A statements are True
            demoAnswers[q.id] = (q.group === 'A') ? 'True' : 'False';
          } else {
            // Secure partner: only group-pB statements are True
            demoAnswers[q.id] = (q.group === 'pB') ? 'True' : 'False';
          }
        });
        var payload = {
          dimensions: {},
          rawAnswers: demoAnswers,
          timestamp: new Date().toISOString()
        };
        var encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
        window.location.href = 'attached-results.html#' + encoded;
        return;
      }
      // ─────────────────────────────────────────────────────────────────────

      var q = new Questionnaire(ATTACHED_CONFIG);
      q.mount('app');
    });
  </script>

</body>
</html>
